<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Сообщения</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #2a2a32;
      --accent: #c8f060;
      --accent2: #60c8f0;
      --text: #e8e8ec;
      --muted: #6b6b7a;
      --radius: 4px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.3;
      pointer-events: none;
    }

    /* ── TOPBAR ──────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(13,13,15,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-name {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .user-name span {
      color: var(--text);
    }

    .btn-logout {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      padding: 7px 14px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
    }

    .btn-logout:hover { opacity: 0.85; transform: translateY(-1px); }

    /* ── MAIN ─────────────────────────────────── */
    main {
      flex: 1;
      max-width: 700px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .page-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .page-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
    }

    /* ── COMPOSE ──────────────────────────────── */
    .compose {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 32px;
    }

    .compose textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      padding: 12px 14px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 12px;
    }

    .compose textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,240,96,0.1);
    }

    .compose-footer {
      display: flex;
      justify-content: flex-end;
    }

    .btn-send {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      padding: 10px 20px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-send:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(200,240,96,0.25);
    }

    /* ── MESSAGES LIST ────────────────────────── */
    .messages-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      animation: slideUp 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .message-author {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent2);
    }

    .message-time {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .message-text {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
    }

    .empty-state {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
    }

    .empty-state .icon {
      font-size: 40px;
      display: block;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">// MESSAGES</div>
    <div class="user-chip">
      <div class="user-name">вошли как <span id="header-user"></span></div>
      <button class="btn-logout" onclick="doLogout()">Выйти</button>
    </div>
  </header>

  <main>
    <div class="page-label">Входящие</div>
    <div class="page-title">Сообщения</div>

    <div class="compose">
      <textarea id="msg-input" placeholder="Написать сообщение…"></textarea>
      <div class="compose-footer">
        <button class="btn-send" onclick="sendMessage()">Отправить</button>
      </div>
    </div>

    <div class="messages-list" id="messages-list">
      <!-- messages rendered here -->
    </div>
  </main>

<script>
  // ── Auth guard ───────────────────────────────
  const currentUser = sessionStorage.getItem('auth_user');
  if (!currentUser) {
    window.location.href = 'index.html';
  }

  document.getElementById('header-user').textContent = currentUser;

  // ── Logout ───────────────────────────────────
  function doLogout() {
    localStorage.removeItem('auto_login');
    localStorage.removeItem('auto_pass');
    sessionStorage.removeItem('auth_user');
    window.location.href = 'index.html';
  }

  // ── Messages storage ─────────────────────────
  function getMessages() {
    return JSON.parse(localStorage.getItem('messages') || '[]');
  }

  function saveMessages(msgs) {
    localStorage.setItem('messages', JSON.stringify(msgs));
  }

  function renderMessages() {
    const list = document.getElementById('messages-list');
    const msgs = getMessages();

    if (msgs.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <span class="icon">💬</span>
          Нет сообщений. Напишите первым!
        </div>`;
      return;
    }

    list.innerHTML = msgs.slice().reverse().map(m => `
      <div class="message-card">
        <div class="message-meta">
          <span class="message-author">@${m.author}</span>
          <span class="message-time">${m.time}</span>
        </div>
        <div class="message-text">${escapeHtml(m.text)}</div>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;

    const msgs = getMessages();
    msgs.push({
      author: currentUser,
      text: text,
      time: new Date().toLocaleString('ru-RU')
    });
    saveMessages(msgs);
    input.value = '';
    renderMessages();
  }

  // Enter to send (Shift+Enter for newline)
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  renderMessages();
</script>
</body>
</html>
